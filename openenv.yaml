name: crisis_response_env
version: "1.0"
description: >
  AI Crisis Response & Rescue Coordination Environment.
  A real-world OpenEnv environment where an AI agent must simultaneously classify
  threats, predict impact, allocate resources, coordinate multi-threat response,
  and optimise rescue operations to maximise lives saved and minimise casualties.

author: crisis-response-team
tags:
  - openenv
  - crisis-management
  - multi-agent
  - rescue
  - real-world
  - reinforcement-learning

environment:
  entry_point: server.app:app
  host: 0.0.0.0
  port: 8000
  protocol: http+websocket

endpoints:
  reset:   POST /reset
  step:    POST /step
  state:   GET  /state
  health:  GET  /health
  tasks:   GET  /tasks
  scores:  GET  /scores
  ws:      WS   /ws

observation_space:
  type: structured
  fields:
    threats:
      type: list[ThreatInfo]
      description: All active, impacted, and resolved threats
    resources:
      type: list[ResourceInfo]
      description: Available and assigned resource units
    affected_zones:
      type: list[AffectedZoneInfo]
      description: Post-impact zones requiring rescue
    time_remaining:
      type: int
      description: Steps remaining in the current episode
    alerts:
      type: list[str]
      description: Human-readable event log for the last step

action_space:
  type: structured
  actions:
    - name: classify
      description: Identify threat type and severity
      payload: ClassificationPayload
    - name: predict
      description: Predict time-to-impact and population affected
      payload: PredictionPayload
    - name: allocate
      description: Assign a resource unit to a threat
      payload: AllocationPayload
    - name: coordinate
      description: Set global priority ordering across all active threats
      payload: CoordinationPayload
    - name: rescue
      description: Deploy rescue units into an impacted zone
      payload: RescuePayload

tasks:
  - id: 1
    name: Threat Classification
    difficulty: easy
    action: classify
    grader: classification_score
    score_range: [0.0, 1.0]
    description: >
      Correctly identify the type and severity of each active threat.
      Score = correct_predictions / total_predictions.

  - id: 2
    name: Impact Prediction
    difficulty: medium
    action: predict
    grader: prediction_score
    score_range: [0.0, 1.0]
    description: >
      Predict time-to-impact and population affected for each threat.
      Score = 1 - normalised_error.

  - id: 3
    name: Resource Allocation
    difficulty: medium_plus
    action: allocate
    grader: allocation_score
    score_range: [0.0, 1.0]
    description: >
      Assign the most effective zone-matched resource to each threat.
      Score = mean(allocation_quality_scores).

  - id: 4
    name: Multi-Threat Coordination
    difficulty: hard
    action: coordinate
    grader: coordination_score
    score_range: [0.0, 1.0]
    description: >
      Set optimal priority ordering across all simultaneous threats.
      Score = weighted rank-correlation vs ideal severity×pop/TTI ordering.

  - id: 5
    name: Rescue Optimisation
    difficulty: advanced
    action: rescue
    grader: rescue_score
    score_range: [0.0, 1.0]
    description: >
      Deploy rescue units into impacted zones to maximise lives saved.
      Score = (lives_saved_ratio + speed_score + resource_efficiency) / 3.

reward:
  internal_range: [-inf, +inf]
  final_score_range: [0.0, 1.0]
  shaping:
    - correct_classification:    +1.0
    - wrong_classification:      -0.3
    - accurate_prediction:       +1.0 (proportional)
    - good_allocation:           +0.8 to +1.3 (zone match bonus)
    - good_coordination:         +0.0 to +1.5
    - rescue_save:               +proportional to victims saved
    - threat_contained:          +2.0
    - threat_resolved:           +1.0
    - casualty_per_person:       -0.002
    - terminal_survival_bonus:   +0.0 to +5.0
    - terminal_resolve_bonus:    +0.0 to +3.0

episode:
  max_steps: 50
  simultaneous_threats: 3
  resource_units: 8

inference:
  script: inference.py
  env_vars:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN
  runtime_limit_minutes: 20
  machine: vcpu=2, memory=8gb
